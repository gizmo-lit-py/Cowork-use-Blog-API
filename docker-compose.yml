services:
  # FastAPIアプリ
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env                 # .envファイルから環境変数を読み込む
    depends_on:
      - db
    volumes:
      - .:/app

  # PostgreSQL
  db:
    image: postgres:16
    env_file:
      - .env                 # .envファイルから環境変数を読み込む
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
